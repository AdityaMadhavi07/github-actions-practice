name: Auto Linter

on:
    push:
      paths: "*.py" # this should work only if any.py file uis pushed into the github

jobs: 
  code:
    runs-on: ubuntu-latest #creates an ephermal container
    steps: 
      # this will automatically clone the code of current branch into the runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v4

      #this step will install the linting tool
      - name: Install Linter
        run: pip install ruff #ruff is a python linter
      
